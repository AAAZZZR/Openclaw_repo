<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    header { background: #1a1a2e; padding: 16px 32px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2a4a; }
    header h1 { font-size: 20px; color: #7c83fd; }
    header span { font-size: 12px; color: #666; }
    .container { padding: 24px 32px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; }
    .card .label { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .card .value { font-size: 28px; font-weight: bold; color: #7c83fd; }
    .card .sub { font-size: 12px; color: #666; margin-top: 4px; }
    h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
    th { text-align: left; padding: 12px 16px; font-size: 12px; color: #666; text-transform: uppercase; border-bottom: 1px solid #2a2a4a; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #1f1f3a; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1f1f3a; cursor: pointer; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
    .badge-main { background: #2a4a7a; color: #7ab3fd; }
    .badge-sub { background: #3a2a4a; color: #c47afd; }
    .model-tag { font-size: 11px; color: #888; }
    .section { margin-bottom: 32px; }
    #detail { display: none; }
    #detail.open { display: block; }
    .back-btn { background: none; border: 1px solid #2a2a4a; color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 16px; font-size: 13px; }
    .back-btn:hover { background: #2a2a4a; }
    .step { padding: 10px 14px; border-left: 2px solid #2a2a4a; margin-bottom: 8px; background: #1a1a2e; border-radius: 0 8px 8px 0; }
    .step .tool { font-size: 12px; color: #7c83fd; font-weight: bold; }
    .step .args { font-size: 12px; color: #888; margin-top: 2px; font-family: monospace; word-break: break-all; }
    .step.read { border-left-color: #4a7a4a; }
    .step.exec { border-left-color: #7a4a4a; }
    .step.web { border-left-color: #7a6a4a; }
    .step.memory { border-left-color: #4a4a7a; }
    .cost-value { color: #4afd9a; font-weight: bold; }
    .loading { color: #666; font-size: 14px; padding: 32px; text-align: center; }
    .by-model { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .model-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px 18px; }
    .model-card .mname { font-size: 12px; color: #7c83fd; margin-bottom: 6px; }
    .model-card .mstat { font-size: 13px; color: #ccc; }
    .refresh-btn { background: none; border: 1px solid #2a2a4a; color: #7c83fd; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; float: right; }
    .refresh-btn:hover { background: #2a2a4a; }
  </style>
</head>
<body>
  <header>
    <h1>🐾 OpenClaw Dashboard</h1>
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </header>

  <div class="container">
    <!-- Summary Cards -->
    <div class="cards">
      <div class="card">
        <div class="label">Total Sessions</div>
        <div class="value" id="total-sessions">—</div>
      </div>
      <div class="card">
        <div class="label">Total Cost</div>
        <div class="value cost-value" id="total-cost">—</div>
      </div>
      <div class="card">
        <div class="label">Input Tokens</div>
        <div class="value" id="total-input">—</div>
        <div class="sub">tokens</div>
      </div>
      <div class="card">
        <div class="label">Output Tokens</div>
        <div class="value" id="total-output">—</div>
        <div class="sub">tokens</div>
      </div>
    </div>

    <!-- By Agent -->
    <div class="section">
      <h2>By Agent</h2>
      <div class="by-model" id="by-agent"><div class="loading">Loading...</div></div>
    </div>

    <!-- By Model -->
    <div class="section">
      <h2>By Model</h2>
      <div class="by-model" id="by-model"><div class="loading">Loading...</div></div>
    </div>

    <!-- Sessions List -->
    <div id="list-view" class="section">
      <h2>Sessions</h2>
      <table>
        <thead>
          <tr>
            <th>Session</th>
            <th>Agent</th>
            <th>Model</th>
            <th>Kind</th>
            <th>Last Activity</th>
          </tr>
        </thead>
        <tbody id="sessions-table"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Session Detail -->
    <div id="detail">
      <button class="back-btn" onclick="showList()">← Back</button>
      <div class="cards" id="detail-cards"></div>
      <h2>Steps</h2>
      <div id="detail-steps"></div>
    </div>
  </div>

  <script>
    const BASE = "";

    async function loadAll() {
      document.getElementById("last-updated").textContent = "Updated: " + new Date().toLocaleTimeString();
      loadSummary();
      loadSessions();
    }

    async function loadSummary() {
      const data = await fetch(`${BASE}/api/summary`).then(r => r.json());
      document.getElementById("total-sessions").textContent = data.totalSessions ?? "—";
      document.getElementById("total-cost").textContent = data.totalCost ?? "—";
      document.getElementById("total-input").textContent = fmtNum(data.totalTokens?.input);
      document.getElementById("total-output").textContent = fmtNum(data.totalTokens?.output);

      // By Agent
      const byAgent = data.byAgent || {};
      const ael = document.getElementById("by-agent");
      if (ael) {
        ael.innerHTML = Object.keys(byAgent).length ? Object.entries(byAgent).map(([agent, v]) => `
          <div class="model-card">
            <div class="mname">🤖 ${agent}</div>
            <div class="mstat">${v.sessions} sessions · ${(v.tokens||0).toLocaleString()} tokens · <span class="cost-value">${v.costStr}</span></div>
          </div>
        `).join("") : '<div class="loading">No data</div>';
      }

      // By Model
      const byModel = data.byModel || {};
      const el = document.getElementById("by-model");
      if (!Object.keys(byModel).length) { el.innerHTML = '<div class="loading">No data</div>'; return; }
      el.innerHTML = Object.entries(byModel).map(([model, v]) => `
        <div class="model-card">
          <div class="mname">${model}</div>
          <div class="mstat">${v.sessions} sessions · <span class="cost-value">$${v.cost.toFixed(6)}</span></div>
        </div>
      `).join("");
    }

    async function loadSessions() {
      const data = await fetch(`${BASE}/api/sessions`).then(r => r.json());
      const tbody = document.getElementById("sessions-table");
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="loading">No sessions found</td></tr>'; return; }
      tbody.innerHTML = data.map(s => `
        <tr onclick="loadDetail('${s.sessionKey}')">
          <td><code>${s.sessionKey}</code></td>
          <td>${s.agentId || "—"}</td>
          <td class="model-tag">${s.model || "—"}</td>
          <td><span class="badge ${s.kind === 'subagent' ? 'badge-sub' : 'badge-main'}">${s.kind || "main"}</span></td>
          <td>${s.lastActivity ? new Date(s.lastActivity).toLocaleString() : "—"}</td>
        </tr>
      `).join("");
    }

    async function loadDetail(sessionKey) {
      document.getElementById("list-view").style.display = "none";
      document.getElementById("detail").classList.add("open");
      document.getElementById("detail-steps").innerHTML = '<div class="loading">Loading steps...</div>';
      document.getElementById("detail-cards").innerHTML = "";

      const data = await fetch(`${BASE}/api/sessions/${sessionKey}`).then(r => r.json());

      document.getElementById("detail-cards").innerHTML = `
        <div class="card"><div class="label">Model</div><div class="value" style="font-size:14px">${data.model || "—"}</div></div>
        <div class="card"><div class="label">Cost</div><div class="value cost-value" style="font-size:20px">${data.cost}</div></div>
        <div class="card"><div class="label">Input Tokens</div><div class="value">${fmtNum(data.tokens?.input)}</div></div>
        <div class="card"><div class="label">Output Tokens</div><div class="value">${fmtNum(data.tokens?.output)}</div></div>
        <div class="card"><div class="label">Steps</div><div class="value">${data.steps?.length || 0}</div></div>
        <div class="card"><div class="label">Messages</div><div class="value">${data.messageCount || 0}</div></div>
      `;

      if (!data.steps?.length) {
        document.getElementById("detail-steps").innerHTML = '<div class="loading">No steps recorded</div>';
        return;
      }

      document.getElementById("detail-steps").innerHTML = data.steps.map((s, i) => `
        <div class="step ${stepClass(s.tool)}">
          <div class="tool">#${i+1} ${s.tool}</div>
          ${s.args ? `<div class="args">${escHtml(s.args)}</div>` : ""}
        </div>
      `).join("");
    }

    function showList() {
      document.getElementById("list-view").style.display = "";
      document.getElementById("detail").classList.remove("open");
    }

    function stepClass(tool) {
      if (!tool) return "";
      if (tool === "Read" || tool === "read") return "read";
      if (tool === "exec") return "exec";
      if (tool === "web_search" || tool === "web_fetch") return "web";
      if (tool === "memory_search" || tool === "memory_get") return "memory";
      return "";
    }

    function fmtNum(n) { return n ? n.toLocaleString() : "0"; }
    function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

    loadAll();
  </script>
</body>
</html>
